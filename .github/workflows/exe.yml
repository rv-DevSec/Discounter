name: Build Windows EXE

on:
  workflow_dispatch:  # manual trigger

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller flask
      - run: pyinstaller --onefile --windowed --name manager_discount --add-data="templates;templates" --add-data="static;static" app.py
      - uses: actions/upload-artifact@v4
        with:
          name: manager_discount-exe
          path: dist/manager_discount.exe
